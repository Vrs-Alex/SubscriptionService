spring:
  application:
    name: subscription

  mvc:
    servlet:
      path: /v1/api

  datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/subscribe_service}
      username: ${SPRING_DATASOURCE_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver

  jpa:
      hibernate:
        ddl-auto: validate
      show-sql: false
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true

  task:
      scheduling:
        pool:
          size: 1

springdoc:
  default-flat-param-object: true